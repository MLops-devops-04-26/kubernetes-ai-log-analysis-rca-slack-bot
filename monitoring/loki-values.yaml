loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

  storage:
    type: filesystem

  storage_config:
    filesystem:
      directory: /var/loki/chunks

singleBinary:
  replicas: 1

deploymentMode: SingleBinary

gateway:
  enabled: false

chunksCache:
  enabled: false

resultsCache:
  enabled: false

minio:
  enabled: false

backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

monitoring:
  dashboards:
    enabled: true

  rules:
    enabled: true

  alerts:
    enabled: true

serviceMonitor:
  enabled: true

test:
  enabled: false

singleBinary:
  persistence:
    enabled: true
    accessModes:
      - ReadWriteOnce
    size: 10Gi

grafanaAgent:
  installOperator: false

sidecar:
  datasources:
    enabled: true

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
